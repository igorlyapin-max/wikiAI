openapi: 3.0.3
info:
  title: WikiAI Gateway API
  version: 0.1.0
  description: Public, admin, health, and external API contract for WikiAI Gateway.
servers:
  - url: http://127.0.0.1:3000
paths:
  /live:
    get:
      summary: Process liveness.
      responses:
        "200":
          description: Gateway process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveStatus"
  /ready:
    get:
      summary: Dependency readiness.
      responses:
        "200":
          description: Gateway dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: One or more dependencies are degraded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /health:
    get:
      summary: Backward-compatible readiness alias.
      responses:
        "200":
          description: Gateway dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: One or more dependencies are degraded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /metrics:
    get:
      summary: Prometheus-compatible process and request metrics.
      responses:
        "200":
          description: Text metrics.
          content:
            text/plain:
              schema:
                type: string
  /api/internal/indexing-profiles:
    get:
      summary: Internal Syncer lookup for admin indexing profiles.
      security:
        - internalAdminToken: []
      responses:
        "200":
          description: Stored or default indexing profiles.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IndexingProfilesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/search:
    post:
      summary: Search allowed MediaWiki content using the admin-selected MediaWiki retrieval profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search response with sources and diagnostics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Admin-selected MediaWiki retrieval profile is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/chat:
    post:
      summary: Chat over allowed MediaWiki content using the admin-selected MediaWiki retrieval profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response or SSE stream depending on request.
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Admin-selected MediaWiki retrieval profile is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/capabilities:
    get:
      summary: External API and MCP capabilities.
      responses:
        "200":
          description: External API capabilities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capabilities"
  /api/v1/search:
    post:
      summary: Stable external search API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: External search response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "409":
          description: Requested retrieval profile is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v1/chat:
    post:
      summary: Stable external chat API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: External chat response.
        "409":
          description: Requested retrieval profile is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/reindex:
    post:
      summary: Start Syncer reindex from the admin plane.
      security:
        - mediaWikiSession: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReindexRequest"
      responses:
        "202":
          description: Reindex job accepted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/reindex/status:
    get:
      summary: Return latest Syncer reindex status.
      security:
        - mediaWikiSession: []
      responses:
        "200":
          description: Reindex status.
  /api/admin/search-index/status:
    get:
      summary: Return BM25/trigram search-index readiness.
      security:
        - mediaWikiSession: []
      responses:
        "200":
          description: Search-index status and readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchIndexStatusResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/mediawiki-profile/config:
    get:
      summary: Return the retrieval profile selected for built-in MediaWiki search and chat.
      security:
        - mediaWikiSession: []
      responses:
        "200":
          description: Selected MediaWiki retrieval profile config and readiness.
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      summary: Save the retrieval profile selected for built-in MediaWiki search and chat.
      security:
        - mediaWikiSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [defaultRetrievalProfileId]
              properties:
                defaultRetrievalProfileId:
                  type: string
                  example: opensearch_hybrid_colbert
      responses:
        "200":
          description: Saved MediaWiki retrieval profile config and readiness.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/opensearch/status:
    get:
      summary: Return OpenSearch service and index readiness.
      security:
        - mediaWikiSession: []
      responses:
        "200":
          description: OpenSearch status.
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/opensearch/analyze:
    post:
      summary: Analyze a query with the configured OpenSearch analyzer.
      security:
        - mediaWikiSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
      responses:
        "200":
          description: Analyzer tokens or disabled fallback tokens.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/opensearch/search-preview:
    post:
      summary: Preview OpenSearch candidates and diagnostics for an admin query.
      security:
        - mediaWikiSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                limit:
                  type: integer
                  minimum: 1
                  maximum: 200
      responses:
        "200":
          description: OpenSearch search-preview diagnostics and chunks.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/search-index/trigram/backfill:
    post:
      summary: Start asynchronous trigram backfill from stored search chunks.
      security:
        - mediaWikiSession: []
      responses:
        "202":
          description: Trigram backfill job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrigramBackfillJobResponse"
        "409":
          description: A trigram backfill job is already running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/search-index/trigram/backfill/status:
    get:
      summary: Return latest trigram backfill job.
      security:
        - mediaWikiSession: []
      responses:
        "200":
          description: Latest trigram backfill job or null.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrigramBackfillJobResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/admin/search-index/trigram/backfill/cancel:
    post:
      summary: Request cancellation of the running trigram backfill job.
      security:
        - mediaWikiSession: []
      responses:
        "200":
          description: Latest trigram backfill job after cancel request or null.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrigramBackfillJobResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    mediaWikiSession:
      type: apiKey
      in: cookie
      name: mediawiki_session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalAdminToken:
      type: apiKey
      in: header
      name: x-wikiai-admin-token
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication is missing or invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Caller is not allowed to use the endpoint.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    LiveStatus:
      type: object
      required: [status, service]
      properties:
        status:
          type: string
          enum: [ok]
        service:
          type: string
          enum: [gateway]
    HealthCheck:
      type: object
      required: [status, latencyMs]
      properties:
        status:
          type: string
        latencyMs:
          type: integer
          minimum: 0
        error:
          type: string
    HealthStatus:
      type: object
      required: [status, checks]
      properties:
        status:
          type: string
          enum: [healthy, degraded]
        checks:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/HealthCheck"
    SearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
        topK:
          type: integer
          minimum: 1
          description: Optional request override for the selected retrieval profile retrievalTopK. If omitted, Gateway uses the profile default.
        retrievalProfileId:
          type: string
          description: Optional admin-defined retrieval profile id for /api/v1/* external APIs. Ignored by built-in MediaWiki /api/search, which uses /api/admin/mediawiki-profile/config. Raw BM25/ColBERT/trigram flags are not accepted by the public API.
        context:
          $ref: "#/components/schemas/ExternalContext"
    SearchChunk:
      type: object
      required: [title, text, score]
      properties:
        title:
          type: string
        pageUrl:
          type: string
        text:
          type: string
        score:
          type: number
        trust:
          type: object
          additionalProperties: true
    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchChunk"
        chunks:
          type: array
          items:
            $ref: "#/components/schemas/SearchChunk"
        diagnostics:
          type: object
          additionalProperties: true
    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
        conversationId:
          type: string
        stream:
          type: boolean
        topK:
          type: integer
          minimum: 1
          description: Optional request override for the selected retrieval profile retrievalTopK. Prompt context still uses contextTopK/contextMaxChars.
        retrievalProfileId:
          type: string
          description: Optional admin-defined retrieval profile id for /api/v1/* external APIs. Ignored by built-in MediaWiki /api/chat, which uses /api/admin/mediawiki-profile/config. Raw BM25/ColBERT/trigram flags are not accepted by the public API.
        context:
          $ref: "#/components/schemas/ExternalContext"
    ExternalContext:
      type: object
      description: Optional caller context for embedded integrations. Gateway validates shape but derives auth server-side.
      properties:
        sourceApp:
          type: string
        objectType:
          type: string
        objectId:
          type: string
        title:
          type: string
        url:
          type: string
        tags:
          type: array
          items:
            type: string
        params:
          type: object
          additionalProperties: true
        attributes:
          type: object
          additionalProperties: true
        dynamicBlocks:
          type: array
          items:
            $ref: "#/components/schemas/DynamicBlockContext"
    DynamicBlockContext:
      type: object
      properties:
        sourceApp:
          type: string
          enum: [cmdbdynamicpages]
        templateCode:
          type: string
        status:
          type: string
          enum: [snapshot_hit, snapshot_miss, auth_runtime_hit, auth_required, permission_denied, runtime_error, unresolved_params]
        title:
          type: string
        url:
          type: string
    Capabilities:
      type: object
      required: [searchEnabled, mcpEnabled, anonymousSearchAllowed, aclMode, groupMappingMode, groupMappingConfigured, groupMappingCount, mappedGroupCount]
      properties:
        searchEnabled:
          type: boolean
        mcpEnabled:
          type: boolean
        anonymousSearchAllowed:
          type: boolean
        aclMode:
          type: string
          enum: [mediawiki_check, groups_only]
        groupMappingMode:
          type: string
          enum: [mapped_only, passthrough_and_mapped]
          description: Determines whether OIDC raw groups are dropped after mapping or kept together with mapped MediaWiki ACL groups.
        groupMappingConfigured:
          type: boolean
          description: True when at least one OIDC/AD source group is mapped to MediaWiki ACL groups.
        groupMappingCount:
          type: integer
          minimum: 0
          description: Number of configured OIDC/AD source group mapping rules.
        mappedGroupCount:
          type: integer
          minimum: 0
          description: Number of unique MediaWiki ACL group names produced by mapping rules.
        defaultRetrievalProfileId:
          type: string
        retrievalProfiles:
          type: array
          items:
            $ref: "#/components/schemas/RetrievalProfileCapability"
    RetrievalProfileReadiness:
      type: object
      required: [status, reasons]
      properties:
        status:
          type: string
          enum: [prod_ready, limited_ready, not_ready]
        reasons:
          type: array
          items:
            type: string
        requiredIndexTargets:
          type: array
          items:
            type: string
        missingIndexTargets:
          type: array
          items:
            type: string
    RetrievalProfileCapability:
      type: object
      required: [id, name, enabled, apiEnabled, mcpEnabled, maxTopK, readiness]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        apiEnabled:
          type: boolean
        mcpEnabled:
          type: boolean
        anonymousAllowed:
          type: boolean
        maxTopK:
          type: integer
        tags:
          type: array
          items:
            type: string
        searchMode:
          type: string
          enum: [vector_only, hybrid, colbert_full, hybrid_colbert]
        lexicalBackend:
          type: string
          enum: [sqlite_fts, opensearch]
        rerankMode:
          type: string
          enum: [none, colbert_v2]
        chatRetrievalQueryMode:
          type: string
          enum: [current_message, history_augmented]
          description: Controls whether chat retrieval uses only the current user message or augments the retrieval query with recent chat history.
        readiness:
          $ref: "#/components/schemas/RetrievalProfileReadiness"
    ReindexRequest:
      type: object
      properties:
        profileId:
          type: string
        indexTargets:
          type: array
          items:
            type: string
            enum: [dense, bm25, colbert, opensearch, attachments, semanticFacts, ontologyVectors]
        source:
          type: string
          enum: [mediawiki, qdrant_payload]
        maxPages:
          type: integer
          minimum: 1
        dryRun:
          type: boolean
        cmdbDynamicPagesEnabled:
          type: boolean
          description: Per-run override for cmdbdynamicpages marker processing.
    DatabaseDiagnostics:
      type: object
      required: [url, dialect, connectionStatus, migrationStatus]
      properties:
        url:
          type: string
          description: Redacted DATABASE_URL.
        dialect:
          type: string
          enum: [sqlite, postgres]
        connectionStatus:
          type: string
          enum: [ok, error]
        migrationStatus:
          type: string
          enum: [ok, error]
        error:
          type: string
    IndexingProfilesResponse:
      type: object
      required: [values]
      properties:
        values:
          type: array
          items:
            type: object
            additionalProperties: true
    SearchIndexStatusResponse:
      type: object
      properties:
        values:
          $ref: "#/components/schemas/SearchIndexStatus"
    SearchIndexStatus:
      type: object
      required: [chunks, ftsChunks, trigramChunks, trigramFtsChunks, pages, populated, backfillRecommended, trigramPopulated, trigramBackfillRecommended, readiness]
      properties:
        chunks:
          type: integer
          minimum: 0
        ftsChunks:
          type: integer
          minimum: 0
        trigramChunks:
          type: integer
          minimum: 0
        trigramFtsChunks:
          type: integer
          minimum: 0
        pages:
          type: integer
          minimum: 0
        latestUpdatedAt:
          type: string
          format: date-time
        populated:
          type: boolean
        backfillRecommended:
          type: boolean
        trigramPopulated:
          type: boolean
          description: True only when chunks > 0 and trigram tables cover every stored chunk.
        trigramBackfillRecommended:
          type: boolean
        readiness:
          $ref: "#/components/schemas/SearchReadiness"
        colbertHealth:
          type: object
          additionalProperties: true
    SearchReadiness:
      type: object
      required: [status, reasons]
      properties:
        status:
          type: string
          enum: [prod_ready, limited_ready, not_ready]
        reasons:
          type: array
          items:
            type: string
    TrigramBackfillJobResponse:
      type: object
      properties:
        values:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/TrigramBackfillJob"
    TrigramBackfillJob:
      type: object
      required: [id, type, status, totalChunks, processedChunks, writtenChunks, grams, startedAt, updatedAt]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [trigram]
        status:
          type: string
          enum: [queued, running, completed, failed, canceled]
        totalChunks:
          type: integer
          minimum: 0
        processedChunks:
          type: integer
          minimum: 0
        writtenChunks:
          type: integer
          minimum: 0
        grams:
          type: integer
          minimum: 0
        requestedBy:
          type: string
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        error:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
