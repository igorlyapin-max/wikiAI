version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "bash", "-lc", ": >/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  colbert:
    build:
      context: ./packages/colbert-service
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8083:8080"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - COLBERT_MODEL=${COLBERT_MODEL:-antoinelouis/colbert-xm}
      - COLBERT_COLLECTION=${COLBERT_COLLECTION:-wiki_colbert_chunks}
      - COLBERT_DEVICE=${COLBERT_DEVICE:-cpu}
      - COLBERT_MAX_TOKENS=${COLBERT_MAX_TOKENS:-180}
      - HF_HOME=/models/huggingface
      - HF_HUB_DISABLE_XET=1
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - colbert_models:/models
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15433}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-wikiai}
      - POSTGRES_USER=${POSTGRES_USER:-wikiai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-wikiai-dev-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikiai} -d ${POSTGRES_DB:-wikiai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  opensearch:
    image: opensearchproject/opensearch:2
    profiles: ["opensearch"]
    ports:
      - "127.0.0.1:${OPENSEARCH_PORT:-9200}:9200"
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-WikiAI-OpenSearch-Dev-1!}
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD", "bash", "-lc", ": >/dev/tcp/127.0.0.1/9200"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  gateway:
    build:
      context: ./packages/gateway
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - GATEWAY_PORT=3000
      - REDIS_URL=redis://host.docker.internal:16379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/state/wiki-ai.sqlite}
      - LITELLM_BASE_URL=http://host.docker.internal:4000/v1
      - LITELLM_API_KEY=${LITELLM_API_KEY:?Set LITELLM_API_KEY in your environment}
      - LITELLM_MODEL=${LITELLM_MODEL:-corp-openai-gpt-4.1-mini}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=wiki_chunks
      - SYNCER_BASE_URL=http://syncer:3001
      - SYNCER_ADMIN_TOKEN=${SYNCER_ADMIN_TOKEN:?Set SYNCER_ADMIN_TOKEN in your environment}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      - COLBERT_BASE_URL=${COLBERT_BASE_URL:-http://colbert:8080}
      - COLBERT_MODEL=${COLBERT_MODEL:-antoinelouis/colbert-xm}
      - COLBERT_COLLECTION=${COLBERT_COLLECTION:-wiki_colbert_chunks}
      - OPENSEARCH_ENABLED=${OPENSEARCH_ENABLED:-false}
      - OPENSEARCH_BASE_URL=${OPENSEARCH_BASE_URL:-http://opensearch:9200}
      - OPENSEARCH_INDEX_NAME=${OPENSEARCH_INDEX_NAME:-wikiai_chunks}
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME:-}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD:-}
      - OPENSEARCH_API_KEY=${OPENSEARCH_API_KEY:-}
      - OPENSEARCH_TIMEOUT_MS=${OPENSEARCH_TIMEOUT_MS:-5000}
      - OPENSEARCH_TLS_REJECT_UNAUTHORIZED=${OPENSEARCH_TLS_REJECT_UNAUTHORIZED:-true}
      - OPENSEARCH_ANALYZER=${OPENSEARCH_ANALYZER:-russian}
      - OPENSEARCH_FUZZY_ENABLED=${OPENSEARCH_FUZZY_ENABLED:-true}
      - OPENSEARCH_HIGHLIGHT_ENABLED=${OPENSEARCH_HIGHLIGHT_ENABLED:-true}
      - OPENSEARCH_TITLE_BOOST=${OPENSEARCH_TITLE_BOOST:-2}
      - OPENSEARCH_TEXT_BOOST=${OPENSEARCH_TEXT_BOOST:-1}
      - OPENSEARCH_CANDIDATE_LIMIT=${OPENSEARCH_CANDIDATE_LIMIT:-50}
      - MW_BASE_URL=http://host.docker.internal:8082
      - MW_PUBLIC_BASE_URL=${MW_PUBLIC_BASE_URL:-http://127.0.0.1:8082}
      - MW_API_PATH=/api.php
      - USER_GROUPS_CACHE_TTL=300
      - CORS_ORIGINS=${CORS_ORIGINS:-http://127.0.0.1:8082,http://localhost:8082}
      - DEBUG_DIAGNOSTICS_ENABLED=${DEBUG_DIAGNOSTICS_ENABLED:-false}
      - DEBUG_DIAGNOSTICS_LEVEL=${DEBUG_DIAGNOSTICS_LEVEL:-Basic}
      - LOG_SINKS=${LOG_SINKS:-stdout,syslog}
      - LOG_SYSLOG_HOST=${LOG_SYSLOG_HOST:-host.docker.internal}
      - LOG_SYSLOG_PORT=${LOG_SYSLOG_PORT:-514}
      - HEALTH_CHECK_TIMEOUT_MS=${HEALTH_CHECK_TIMEOUT_MS:-2000}
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./state:/app/state
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  syncer:
    build:
      context: ./packages/syncer
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - NODE_ENV=production
      - SYNCER_PORT=3001
      - SYNCER_ADMIN_TOKEN=${SYNCER_ADMIN_TOKEN:?Set SYNCER_ADMIN_TOKEN in your environment}
      - ALLOW_UNPROTECTED_SYNCER_ADMIN=false
      - MW_BASE_URL=http://host.docker.internal:8082
      - MW_API_PATH=/api.php
      - MW_SERVICE_USERNAME=${MW_SERVICE_USERNAME:-}
      - MW_SERVICE_PASSWORD=${MW_SERVICE_PASSWORD:-}
      - MW_SERVICE_PASSWORD_SECRET=${MW_SERVICE_PASSWORD_SECRET:-}
      - MW_SYNC_COOKIE=${MW_SYNC_COOKIE:-}
      - SECRETS_PROVIDER=${SECRETS_PROVIDER:-None}
      - PAMURL=${PAMURL:-}
      - PAMTOKEN=${PAMTOKEN:-}
      - PAMTOKENFILE=${PAMTOKENFILE:-}
      - PAMUSERNAME=${PAMUSERNAME:-}
      - PAMPASSWORD=${PAMPASSWORD:-}
      - PAMDEFAULTACCOUNTPATH=${PAMDEFAULTACCOUNTPATH:-}
      - PAMPASSWORDENDPOINTPATH=${PAMPASSWORDENDPOINTPATH:-/sc_aapm_ui/rest/aapm/password}
      - PAMRESPONSETYPE=${PAMRESPONSETYPE:-json}
      - PAMVALUEJSONPATH=${PAMVALUEJSONPATH:-password}
      - PAM_SEND_APPLICATION_CREDENTIALS_IN_QUERY=${PAM_SEND_APPLICATION_CREDENTIALS_IN_QUERY:-false}
      - PAMPASSWORDEXPIRATIONINMINUTE=${PAMPASSWORDEXPIRATIONINMINUTE:-}
      - PAMPASSWORDCHANGEREQUIRED=${PAMPASSWORDCHANGEREQUIRED:-}
      - PAMCOMMENT=${PAMCOMMENT:-wikiai {service} {secretId}}
      - PAMTENANTID=${PAMTENANTID:-}
      - PAMPIN=${PAMPIN:-}
      - PAMTIMEOUTMS=${PAMTIMEOUTMS:-10000}
      - REDIS_URL=redis://host.docker.internal:16379/0
      - DATABASE_URL=${DATABASE_URL:-sqlite:///app/state/wiki-ai.sqlite}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=wiki_chunks
      - GATEWAY_BASE_URL=http://gateway:3000
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      - CHUNK_SIZE=512
      - CHUNK_OVERLAP=50
      - NAMESPACE_ACL={"0":["*"],"3000":["*"],"3010":["ai-hr","ai-exec"],"3020":["ai-finance","ai-exec"],"3030":["ai-it","ai-exec"],"3040":["sysop","aiadmin","ai-exec"]}
      - SMW_SYNC_ENABLED=${SMW_SYNC_ENABLED:-true}
      - SMW_SYNC_PROPERTIES=${SMW_SYNC_PROPERTIES:-Департамент,Отдел,Тип документа,Владелец процесса,Статус документа,Система,Процесс,Дата действия,Критичность}
      - DEBUG_DIAGNOSTICS_ENABLED=${DEBUG_DIAGNOSTICS_ENABLED:-false}
      - DEBUG_DIAGNOSTICS_LEVEL=${DEBUG_DIAGNOSTICS_LEVEL:-Basic}
      - LOG_SINKS=${LOG_SINKS:-stdout,syslog}
      - LOG_SYSLOG_HOST=${LOG_SYSLOG_HOST:-host.docker.internal}
      - LOG_SYSLOG_PORT=${LOG_SYSLOG_PORT:-514}
      - HEALTH_CHECK_TIMEOUT_MS=${HEALTH_CHECK_TIMEOUT_MS:-2000}
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./state:/app/state
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_storage:
  ollama_data:
  colbert_models:
  postgres_data:
  opensearch_data:
